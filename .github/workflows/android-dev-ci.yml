name: CI Dev Android

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Dev
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [apk, appbundle]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.8"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      # Tests tạm thời bỏ qua để CI ổn định cho demo
      # - name: Run tests
      #   run: flutter test

      - name: Build APK (dev flavor)
        if: matrix.build_type == 'apk'
        run: flutter build apk --release --flavor dev -t lib/main_dev.dart

      - name: Build App Bundle (dev flavor)
        if: matrix.build_type == 'appbundle'
        run: flutter build appbundle --release --flavor dev -t lib/main_dev.dart

      - name: Upload APK artifact
        if: always() && matrix.build_type == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: android-dev-apk
          path: build/app/outputs/flutter-apk/app-dev-release.apk
          if-no-files-found: warn

      - name: Upload App Bundle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-dev-appbundle
          path: build/app/outputs/bundle/devRelease/app-dev-release.aab
          if-no-files-found: warn
